basePath: /api/v1
definitions:
  graph.ExecutionNode:
    properties:
      task_id:
        type: integer
      title:
        type: string
    type: object
  handler.addDependencyRequest:
    properties:
      depends_on_task_id:
        type: integer
    required:
    - depends_on_task_id
    type: object
  handler.createProjectRequest:
    properties:
      description:
        type: string
      name:
        type: string
    required:
    - name
    type: object
  handler.createTaskRequest:
    properties:
      deadline:
        type: string
      description:
        type: string
      estimated_hours:
        type: number
      priority:
        $ref: '#/definitions/models.TaskPriority'
      status:
        $ref: '#/definitions/models.TaskStatus'
      title:
        type: string
    required:
    - title
    type: object
  handler.updateProjectRequest:
    properties:
      description:
        type: string
      name:
        type: string
    required:
    - name
    type: object
  handler.updateTaskRequest:
    properties:
      deadline:
        type: string
      description:
        type: string
      estimated_hours:
        type: number
      priority:
        $ref: '#/definitions/models.TaskPriority'
      status:
        $ref: '#/definitions/models.TaskStatus'
      title:
        type: string
    required:
    - status
    - title
    type: object
  models.Project:
    properties:
      created_at:
        type: string
      description:
        type: string
      id:
        type: integer
      name:
        type: string
      tasks:
        items:
          $ref: '#/definitions/models.Task'
        type: array
      updated_at:
        type: string
    type: object
  models.Task:
    properties:
      created_at:
        type: string
      deadline:
        type: string
      dependencies:
        items:
          $ref: '#/definitions/models.TaskDependency'
        type: array
      dependent_on_tasks:
        items:
          $ref: '#/definitions/models.TaskDependency'
        type: array
      description:
        type: string
      estimated_hours:
        type: number
      id:
        type: integer
      priority:
        $ref: '#/definitions/models.TaskPriority'
      project_id:
        type: integer
      status:
        $ref: '#/definitions/models.TaskStatus'
      title:
        type: string
      updated_at:
        type: string
    type: object
  models.TaskDependency:
    properties:
      depends_on_task_id:
        type: integer
      id:
        type: integer
      task_id:
        type: integer
    type: object
  models.TaskPriority:
    enum:
    - low
    - medium
    - high
    type: string
    x-enum-varnames:
    - TaskPriorityLow
    - TaskPriorityMedium
    - TaskPriorityHigh
  models.TaskStatus:
    enum:
    - pending
    - in_progress
    - completed
    - blocked
    type: string
    x-enum-varnames:
    - TaskStatusPending
    - TaskStatusInProgress
    - TaskStatusCompleted
    - TaskStatusBlocked
  response.ErrorResponse:
    properties:
      code:
        type: string
      error:
        type: string
    type: object
  service.ProjectStats:
    properties:
      critical_path_hours:
        type: number
      overdue_tasks:
        type: integer
      total_estimated_hours:
        type: number
      workload_per_day:
        additionalProperties:
          format: float64
          type: number
        type: object
    type: object
  service.RiskyTask:
    properties:
      reason:
        type: string
      task_id:
        type: integer
      title:
        type: string
    type: object
info:
  contact: {}
  description: TaskFlow is a workflow task management API where users create projects,
    define tasks with dependencies, and the system determines execution order.
  title: TaskFlow API
  version: "1.0"
paths:
  /projects:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.Project'
            type: array
      summary: List projects
      tags:
      - projects
    post:
      consumes:
      - application/json
      description: Create a new project
      parameters:
      - description: Project
        in: body
        name: project
        required: true
        schema:
          $ref: '#/definitions/handler.createProjectRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.Project'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: Create project
      tags:
      - projects
  /projects/{id}:
    delete:
      parameters:
      - description: Project ID
        in: path
        name: id
        required: true
        type: integer
      responses:
        "204":
          description: No Content
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: Delete project
      tags:
      - projects
    put:
      consumes:
      - application/json
      parameters:
      - description: Project ID
        in: path
        name: id
        required: true
        type: integer
      - description: Project
        in: body
        name: project
        required: true
        schema:
          $ref: '#/definitions/handler.updateProjectRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Project'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: Update project
      tags:
      - projects
  /projects/{id}/execution-plan:
    get:
      parameters:
      - description: Project ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/graph.ExecutionNode'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: Get execution plan
      tags:
      - projects
  /projects/{id}/risks:
    get:
      parameters:
      - description: Project ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/service.RiskyTask'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: Get project risks
      tags:
      - projects
  /projects/{id}/stats:
    get:
      parameters:
      - description: Project ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/service.ProjectStats'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: Get project stats
      tags:
      - projects
  /projects/{project_id}/tasks:
    get:
      parameters:
      - description: Project ID
        in: path
        name: project_id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.Task'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: List project tasks
      tags:
      - tasks
    post:
      consumes:
      - application/json
      parameters:
      - description: Project ID
        in: path
        name: project_id
        required: true
        type: integer
      - description: Task
        in: body
        name: task
        required: true
        schema:
          $ref: '#/definitions/handler.createTaskRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.Task'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: Create task
      tags:
      - tasks
  /projects/{project_id}/tasks/{id}:
    get:
      parameters:
      - description: Project ID
        in: path
        name: project_id
        required: true
        type: integer
      - description: Task ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Task'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: Get task within a project
      tags:
      - tasks
    put:
      consumes:
      - application/json
      parameters:
      - description: Project ID
        in: path
        name: project_id
        required: true
        type: integer
      - description: Task ID
        in: path
        name: id
        required: true
        type: integer
      - description: Task
        in: body
        name: task
        required: true
        schema:
          $ref: '#/definitions/handler.updateTaskRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Task'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: Update task within a project
      tags:
      - tasks
  /projects/{project_id}/tasks/{id}/dependencies:
    post:
      consumes:
      - application/json
      parameters:
      - description: Project ID
        in: path
        name: project_id
        required: true
        type: integer
      - description: Task ID
        in: path
        name: id
        required: true
        type: integer
      - description: Dependency
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/handler.addDependencyRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.ErrorResponse'
      summary: Add task dependency within a project
      tags:
      - tasks
swagger: "2.0"
